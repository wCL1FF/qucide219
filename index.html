<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>_qucide219 | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600&family=Oxanium:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Oxanium', sans-serif;
            background: #07060d;
            overflow-x: hidden;
        }

        /* Animated gradient background behind grid */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(80,20,160,0.22) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 20% 80%, rgba(60,10,120,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 60%, rgba(100,30,180,0.10) 0%, transparent 60%),
                #07060d;
            animation: bgShift 8s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0%   { filter: hue-rotate(0deg) brightness(1); }
            33%  { filter: hue-rotate(30deg) brightness(1.08); }
            66%  { filter: hue-rotate(-20deg) brightness(0.95); }
            100% { filter: hue-rotate(15deg) brightness(1.05); }
        }

        /* Grid lines with shimmer animation */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(123,47,247,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(123,47,247,0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridPulse 4s ease-in-out infinite alternate;
        }

        @keyframes gridPulse {
            0%   { opacity: 0.6; background-position: 0 0; }
            50%  { opacity: 1; background-position: 2px 2px; }
            100% { opacity: 0.7; background-position: 0 0; }
        }

        /* Moving shimmer beam across grid */
        .bg-shimmer {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                110deg,
                transparent 20%,
                rgba(160, 80, 255, 0.04) 40%,
                rgba(200, 100, 255, 0.08) 50%,
                rgba(160, 80, 255, 0.04) 60%,
                transparent 80%
            );
            background-size: 200% 200%;
            animation: shimmerMove 5s linear infinite;
        }

        @keyframes shimmerMove {
            0%   { background-position: -100% 0; }
            100% { background-position: 300% 0; }
        }

        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100,30,200,0.09) 0%, transparent 70%);
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50%       { transform: translateX(-50%) translateY(20px); }
        }

        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
            max-width: 420px;
            padding: 40px 24px 36px;
        }

        .avatar-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 22px;
        }

        .avatar-wrap::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #7b2ff7, #a855f7, #4f0fa8, #7b2ff7);
            animation: spin 6s linear infinite;
            z-index: -1;
        }

        .avatar-wrap::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: #07060d;
            z-index: -1;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 1;
        }

        .name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 4px;
        }

        .desc {
            font-size: 13px;
            color: rgba(180,150,255,0.75);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 300;
        }

        .email {
            font-size: 12px;
            color: rgba(255,255,255,0.28);
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        /* Social icons row */
        .socials {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            color: rgba(255,255,255,0.55);
        }

        .social-icon:hover {
            border-color: rgba(123,47,247,0.5);
            background: rgba(123,47,247,0.12);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(123,47,247,0.15);
        }

        .social-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .sep {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(123,47,247,0.5), transparent);
            margin: 0 auto 24px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Base button */
        .btn {
            position: relative;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 15px 20px;
            border-radius: 10px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-family: 'Oxanium', sans-serif;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: all 0.35s ease;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Shimmer sweep on hover */
        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.06), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::after { left: 150%; }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(123,47,247,0.12), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover {
            border-color: rgba(123,47,247,0.45);
            color: #fff;
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 24px rgba(123,47,247,0.14);
        }

        .btn:hover::before { opacity: 1; }

        .btn:active {
            transform: translateY(0) scale(0.99);
            box-shadow: 0 3px 10px rgba(123,47,247,0.1);
        }

        .btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            opacity: 0.7;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            transition: opacity 0.3s, transform 0.3s;
        }

        .btn:hover svg {
            opacity: 1;
            transform: scale(1.15);
        }

        .btn span { position: relative; z-index: 1; }

        /* Edit button — green accent */
        .btn-edit {
            border-color: rgba(47,247,120,0.25);
            color: rgba(150,255,190,0.9);
        }
        .btn-edit::before {
            background: linear-gradient(135deg, rgba(47,247,120,0.10), transparent);
        }
        .btn-edit:hover {
            border-color: rgba(47,247,120,0.55);
            box-shadow: 0 8px 24px rgba(47,247,120,0.12);
            color: #fff;
        }
        .btn-edit .badge {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            letter-spacing: 1px;
            color: rgba(47,247,120,0.85);
            border: 1px solid rgba(47,247,120,0.35);
            padding: 2px 8px;
            border-radius: 4px;
            z-index: 1;
            font-weight: 600;
        }
    </style>
</head>
